<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link as="style" crossorigin="" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-fixed": "#2f1500",
              "on-secondary-container": "#aec6ff",
              "tertiary": "#ffb77d",
              "surface-dim": "#131318",
              "error": "#ffb4ab",
              "on-tertiary-fixed-variant": "#6e3900",
              "on-secondary-fixed": "#001a43",
              "background": "#0A0A0F",
              "tertiary-fixed-dim": "#ffb77d",
              "surface-container-high": "#2a292f",
              "on-background": "#F0F0F5",
              "surface-container": "#1f1f25",
              "primary-container": "#947dff",
              "on-error-container": "#ffdad6",
              "on-surface": "#F0F0F5",
              "inverse-on-surface": "#303036",
              "primary": "#7C5CFC",
              "surface-tint": "#cabeff",
              "on-tertiary-container": "#432100",
              "on-primary-fixed": "#1c0062",
              "surface-container-lowest": "#12121A",
              "surface-bright": "#39383e",
              "secondary": "#9898A8",
              "primary-fixed": "#e6deff",
              "on-primary": "#F0F0F5",
              "on-primary-fixed-variant": "#4918c8",
              "inverse-surface": "#e4e1e9",
              "inverse-primary": "#613de0",
              "secondary-fixed-dim": "#aec6ff",
              "surface-container-low": "#1b1b20",
              "on-surface-variant": "#c9c4d8",
              "secondary-fixed": "#d8e2ff",
              "on-primary-container": "#2b0088",
              "surface-variant": "#35343a",
              "outline-variant": "#2A2A3A",
              "on-tertiary": "#4d2600",
              "secondary-container": "#024ead",
              "on-secondary-fixed-variant": "#004397",
              "surface-container-highest": "#1A1A25",
              "surface": "#12121A",
              "on-secondary": "#002e6b",
              "tertiary-container": "#d57a20",
              "primary-fixed-dim": "#cabeff",
              "on-error": "#690005",
              "tertiary-fixed": "#ffdcc3",
              "outline": "#5A5A6E",
              "error-container": "#93000a"
            },
            fontFamily: {
              "headline": ["Pretendard", "sans-serif"],
              "body": ["Pretendard", "sans-serif"],
              "label": ["Pretendard", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      body {
        font-family: 'Pretendard', sans-serif;
        background-color: #0A0A0F;
      }
      .brand-gradient {
        background: linear-gradient(135deg, #7C5CFC 0%, #5B8DEF 100%);
      }
      .input-focus-glow:focus {
        outline: none;
        border-color: #7C5CFC;
        box-shadow: 0 0 0 2px rgba(124, 92, 252, 0.15);
      }
      .glass-effect {
        backdrop-filter: blur(20px);
        background-color: rgba(26, 26, 37, 0.7);
      }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-6 antialiased">
<!-- Top Glow Effect (Asymmetrical/Editorial) -->
<div class="fixed -top-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed top-1/2 -right-24 w-64 h-64 bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
<main class="w-full max-w-md z-10">
<!-- Brand Identity Container -->
<div class="text-center mb-8">
<h1 class="text-3xl font-extrabold tracking-tighter text-on-surface mb-2">Maketaa</h1>
<div class="w-12 h-1 brand-gradient mx-auto rounded-full"></div>
</div>
<!-- Signup Card -->
<div class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-8 shadow-2xl">
<div class="mb-8">
<h2 class="text-2xl font-semibold text-on-surface tracking-tight">회원가입</h2>
<p class="text-secondary text-sm mt-1">Maketaa와 함께 성장을 시작하세요</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-medium text-outline uppercase tracking-wider" for="email">이메일</label>
<input class="w-full bg-surface-container-highest border border-outline-variant/40 rounded-lg px-4 py-3 text-on-surface placeholder-outline/50 input-focus-glow transition-all duration-200" id="email" name="email" placeholder="example@email.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-xs font-medium text-outline uppercase tracking-wider" for="password">비밀번호</label>
<input class="w-full bg-surface-container-highest border border-outline-variant/40 rounded-lg px-4 py-3 text-on-surface placeholder-outline/50 input-focus-glow transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="block text-xs font-medium text-outline uppercase tracking-wider" for="confirm-password">비밀번호 확인</label>
<input class="w-full bg-surface-container-highest border border-outline-variant/40 rounded-lg px-4 py-3 text-on-surface placeholder-outline/50 input-focus-glow transition-all duration-200" id="confirm-password" name="confirm-password" placeholder="••••••••" type="password"/>
</div>
<!-- Terms/Privacy (Editorial spacing) -->
<div class="pt-2">
<label class="flex items-start gap-3 cursor-pointer group">
<input class="mt-1 rounded border-outline-variant/40 bg-surface-container-highest text-primary focus:ring-primary/20" type="checkbox"/>
<span class="text-xs text-secondary leading-relaxed group-hover:text-on-surface transition-colors">
                            서비스 이용약관 및 개인정보 처리방침에 동의합니다.
                        </span>
</label>
</div>
<!-- Submit Button -->
<button class="w-full brand-gradient text-on-surface font-semibold py-3.5 rounded-lg shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<span>회원가입</span>
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</form>
<!-- Bottom Redirect -->
<div class="mt-8 text-center">
<p class="text-secondary text-sm">
                    이미 계정이 있으신가요? 
                    <a class="text-primary font-medium ml-2 hover:underline decoration-primary/40 underline-offset-4 transition-all" href="/login">로그인</a>
</p>
</div>
</div>
<!-- Social Proof/Trust (Asymmetrical Detail) -->
<div class="mt-12 flex flex-col items-center opacity-40">
<p class="text-[10px] uppercase tracking-[0.2em] text-outline mb-4">Trusted by modern marketers</p>
<div class="flex gap-8 items-center filter grayscale contrast-125">
<div class="h-4 w-20 bg-outline/20 rounded-full"></div>
<div class="h-4 w-16 bg-outline/20 rounded-full"></div>
<div class="h-4 w-24 bg-outline/20 rounded-full"></div>
</div>
</div>
</main>
<!-- Footer Area (Suppressed Nav but subtle footer) -->
<footer class="mt-auto py-8 text-center">
<p class="text-[10px] text-outline/50 uppercase tracking-widest">© 2024 Aura AI Marketing. Editorial Intelligence.</p>
</footer>
</body></html>
