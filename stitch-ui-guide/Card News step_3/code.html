<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary": "#ffb77d",
              "secondary-fixed-dim": "#aec6ff",
              "inverse-primary": "#613de0",
              "outline-variant": "#484555",
              "on-secondary-container": "#aec6ff",
              "on-surface": "#e4e1e9",
              "surface": "#131318",
              "primary-fixed-dim": "#cabeff",
              "outline": "#938ea1",
              "on-tertiary-fixed-variant": "#6e3900",
              "on-tertiary": "#4d2600",
              "secondary": "#aec6ff",
              "surface-variant": "#35343a",
              "error": "#ffb4ab",
              "primary-container": "#947dff",
              "on-tertiary-fixed": "#2f1500",
              "on-error": "#690005",
              "inverse-surface": "#e4e1e9",
              "background": "#131318",
              "secondary-fixed": "#d8e2ff",
              "tertiary-container": "#d57a20",
              "surface-container-high": "#2a292f",
              "on-secondary": "#002e6b",
              "on-primary-fixed-variant": "#4918c8",
              "primary": "#cabeff",
              "on-background": "#e4e1e9",
              "error-container": "#93000a",
              "surface-tint": "#cabeff",
              "primary-fixed": "#e6deff",
              "on-secondary-fixed-variant": "#004397",
              "on-error-container": "#ffdad6",
              "inverse-on-surface": "#303036",
              "surface-container-lowest": "#0e0e13",
              "secondary-container": "#024ead",
              "tertiary-fixed-dim": "#ffb77d",
              "on-tertiary-container": "#432100",
              "tertiary-fixed": "#ffdcc3",
              "on-primary-container": "#2b0088",
              "surface-dim": "#131318",
              "surface-container-low": "#1b1b20",
              "on-secondary-fixed": "#001a43",
              "surface-container-highest": "#35343a",
              "surface-bright": "#39383e",
              "on-primary-fixed": "#1c0062",
              "on-surface-variant": "#c9c4d8",
              "surface-container": "#1f1f25",
              "on-primary": "#32009a"
            },
            fontFamily: {
              "headline": ["Pretendard", "Manrope", "sans-serif"],
              "body": ["Pretendard", "Inter", "sans-serif"],
              "label": ["Pretendard", "Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Pretendard', sans-serif; background-color: #0A0A0F; color: #F0F0F5; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass { background: rgba(35, 35, 48, 0.6); backdrop-filter: blur(20px); }
        .brand-gradient { background: linear-gradient(135deg, #7C5CFC 0%, #5B8DEF 100%); }
        .ghost-border { border: 1px solid rgba(42, 42, 58, 0.4); }
        .active-ring { ring: 2px solid #7C5CFC; box-shadow: 0 0 15px rgba(124, 92, 252, 0.3); }
    </style>
</head>
<body class="bg-[#0A0A0F] text-[#F0F0F5] min-h-screen">
<!-- TopNavBar (Shared Component) -->
<nav class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 w-full bg-[#12121A]">
<div class="flex items-center gap-8">
<span class="text-lg font-bold tracking-tighter text-[#F0F0F5]">Maketaa Lumina</span>
<div class="hidden md:flex gap-6">
<a class="text-[#9898A8] hover:text-[#F0F0F5] transition-colors font-['Pretendard'] text-[0.875rem] leading-relaxed" href="#">Drafts</a>
<a class="text-[#9898A8] hover:text-[#F0F0F5] transition-colors font-['Pretendard'] text-[0.875rem] leading-relaxed" href="#">Templates</a>
<a class="text-[#9898A8] hover:text-[#F0F0F5] transition-colors font-['Pretendard'] text-[0.875rem] leading-relaxed" href="#">Archive</a>
</div>
</div>
<div class="flex items-center gap-4">
<button class="text-[#9898A8] hover:bg-[#1A1A25] rounded-md transition-all p-2 active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
<button class="text-[#9898A8] hover:bg-[#1A1A25] rounded-md transition-all p-2 active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
<button class="brand-gradient text-white px-4 py-2 rounded-lg font-semibold text-sm active:scale-95 duration-200 shadow-[0_4px_12px_rgba(124,92,252,0.4)]">
                Save Progress
            </button>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="pt-24 pb-12 px-4 flex flex-col items-center">
<div class="w-full max-w-[640px]">
<!-- Step Indicator -->
<div class="flex items-center justify-center gap-4 mb-10">
<div class="flex items-center gap-2">
<div class="w-6 h-6 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center border border-emerald-500/30">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="text-sm font-medium text-emerald-400">주제</span>
</div>
<div class="h-[1px] w-8 bg-[#232330]"></div>
<div class="flex items-center gap-2">
<div class="w-6 h-6 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center border border-emerald-500/30">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="text-sm font-medium text-emerald-400">목적</span>
</div>
<div class="h-[1px] w-8 bg-[#232330]"></div>
<div class="flex items-center gap-2">
<div class="w-6 h-6 rounded-full brand-gradient text-white flex items-center justify-center">
<span class="text-xs font-bold">3</span>
</div>
<span class="text-sm font-bold text-[#F0F0F5]">디자인</span>
</div>
</div>
<!-- Heading -->
<div class="text-center mb-10">
<h1 class="text-2xl font-semibold text-[#F0F0F5] mb-2 font-headline">디자인 스타일을 선택하세요</h1>
<p class="text-[#9898A8] text-sm">콘텐츠의 성격에 가장 잘 어울리는 템플릿을 골라보세요.</p>
</div>
<!-- Template Grid -->
<div class="grid grid-cols-2 gap-4 mb-12">
<!-- Template Card: Editorial (Selected) -->
<button class="group flex flex-col text-left focus:outline-none">
<div class="relative w-full aspect-[4/5] rounded-xl overflow-hidden mb-3 ghost-border bg-[#1A1A25] p-1 border-2 border-[#7C5CFC] shadow-[0_0_20px_rgba(124,92,252,0.15)]">
<div class="w-full h-full rounded-lg bg-[#232330] overflow-hidden flex flex-col">
<div class="w-full h-2/3 bg-gradient-to-br from-[#2A2A3A] to-[#1A1A25] relative">
<div class="absolute top-4 left-4 w-12 h-1 bg-[#7C5CFC]"></div>
<div class="absolute bottom-4 left-4 right-4 h-12 bg-white/5 rounded backdrop-blur-sm"></div>
</div>
<div class="p-4 space-y-2">
<div class="h-2 w-3/4 bg-[#5A5A6E]/30 rounded"></div>
<div class="h-2 w-1/2 bg-[#5A5A6E]/30 rounded"></div>
</div>
</div>
</div>
<span class="text-sm font-semibold text-[#F0F0F5] px-1">에디토리얼</span>
</button>
<!-- Template Card: Minimal -->
<button class="group flex flex-col text-left focus:outline-none">
<div class="relative w-full aspect-[4/5] rounded-xl overflow-hidden mb-3 ghost-border bg-[#1A1A25] p-1 hover:border-[#7C5CFC]/50 transition-all">
<div class="w-full h-full rounded-lg bg-[#12121A] flex flex-col items-center justify-center p-6 text-center">
<div class="w-full h-1/2 flex items-center justify-center mb-4">
<div class="w-16 h-16 rounded-full border border-[#5A5A6E]/30 flex items-center justify-center">
<div class="w-8 h-8 rounded-full bg-[#5A5A6E]/20"></div>
</div>
</div>
<div class="w-full space-y-2">
<div class="h-1.5 w-full bg-[#5A5A6E]/20 rounded"></div>
<div class="h-1.5 w-2/3 mx-auto bg-[#5A5A6E]/20 rounded"></div>
</div>
</div>
</div>
<span class="text-sm font-medium text-[#9898A8] group-hover:text-[#F0F0F5] transition-colors px-1">미니멀</span>
</button>
<!-- Template Card: Bold -->
<button class="group flex flex-col text-left focus:outline-none">
<div class="relative w-full aspect-[4/5] rounded-xl overflow-hidden mb-3 ghost-border bg-[#1A1A25] p-1 hover:border-[#7C5CFC]/50 transition-all">
<div class="w-full h-full rounded-lg bg-[#1A1A25] p-4 flex flex-col justify-end gap-2">
<div class="w-full h-full absolute inset-0 opacity-20" data-alt="Abstract dot pattern for bold style" style="background-image: radial-gradient(circle at 2px 2px, #7C5CFC 1px, transparent 0); background-size: 16px 16px;"></div>
<div class="h-6 w-full bg-[#7C5CFC] rounded relative z-10"></div>
<div class="h-6 w-3/4 bg-[#F0F0F5] rounded relative z-10"></div>
</div>
</div>
<span class="text-sm font-medium text-[#9898A8] group-hover:text-[#F0F0F5] transition-colors px-1">볼드</span>
</button>
<!-- Template Card: Soft -->
<button class="group flex flex-col text-left focus:outline-none">
<div class="relative w-full aspect-[4/5] rounded-xl overflow-hidden mb-3 ghost-border bg-[#1A1A25] p-1 hover:border-[#7C5CFC]/50 transition-all">
<div class="w-full h-full rounded-lg bg-gradient-to-tr from-[#1A1A25] to-[#232330] p-6 flex flex-col gap-4">
<div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-[#7C5CFC]/20 to-[#5B8DEF]/20 blur-xl"></div>
<div class="space-y-2 mt-auto">
<div class="h-2 w-full bg-[#F0F0F5]/10 rounded-full"></div>
<div class="h-2 w-4/5 bg-[#F0F0F5]/10 rounded-full"></div>
</div>
</div>
</div>
<span class="text-sm font-medium text-[#9898A8] group-hover:text-[#F0F0F5] transition-colors px-1">소프트</span>
</button>
</div>
<!-- Ratio Selector -->
<div class="mb-16">
<label class="block text-xs font-semibold text-[#5A5A6E] uppercase tracking-wider mb-4 px-1">Canvas Ratio</label>
<div class="grid grid-cols-3 gap-3">
<!-- 1:1 -->
<button class="flex flex-col items-center justify-center p-4 rounded-xl ghost-border bg-[#12121A] hover:bg-[#1A1A25] transition-all group focus:outline-none">
<div class="w-10 h-10 border-2 border-[#5A5A6E] rounded mb-2 group-hover:border-[#7C5CFC] transition-colors"></div>
<span class="text-xs font-medium text-[#9898A8] group-hover:text-[#F0F0F5]">1:1 (Square)</span>
</button>
<!-- 4:5 (Active) -->
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-[#1A1A25] border border-[#7C5CFC] group focus:outline-none">
<div class="w-8 h-10 border-2 border-[#7C5CFC] rounded mb-2 bg-[#7C5CFC]/10"></div>
<span class="text-xs font-bold text-[#F0F0F5]">4:5 (Portrait)</span>
</button>
<!-- 9:16 -->
<button class="flex flex-col items-center justify-center p-4 rounded-xl ghost-border bg-[#12121A] hover:bg-[#1A1A25] transition-all group focus:outline-none">
<div class="w-6 h-10 border-2 border-[#5A5A6E] rounded mb-2 group-hover:border-[#7C5CFC] transition-colors"></div>
<span class="text-xs font-medium text-[#9898A8] group-hover:text-[#F0F0F5]">9:16 (Story)</span>
</button>
</div>
</div>
<!-- Bottom Actions -->
<div class="flex items-center justify-between gap-4 pt-8 border-t border-[#1A1A25]">
<button class="px-8 py-3 rounded-xl ghost-border text-[#9898A8] font-semibold text-sm hover:bg-[#1A1A25] hover:text-[#F0F0F5] transition-all active:scale-95">
                    이전
                </button>
<button class="brand-gradient px-8 py-3 rounded-xl text-white font-bold text-sm flex items-center gap-2 shadow-[0_4px_20px_rgba(124,92,252,0.4)] active:scale-95 transition-all">
<span>생성하기</span>
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</button>
</div>
</div>
</main>
<!-- SideNavBar (Shared Component - Hidden on Mobile) -->
<aside class="hidden lg:flex flex-col py-8 gap-2 h-screen w-64 fixed left-0 top-0 bg-[#12121A] border-r border-[#1A1A25]">
<div class="px-6 mb-8">
<h2 class="text-xl font-bold text-[#F0F0F5]">Creator Studio</h2>
<p class="text-xs text-[#9898A8]">Pro Plan</p>
</div>
<div class="flex flex-col gap-1 px-2">
<a class="flex items-center gap-3 bg-[#1A1A25] text-[#F0F0F5] rounded-lg px-4 py-3 border-l-4 border-[#7C5CFC] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
<span class="font-medium">Generator</span>
</a>
<a class="flex items-center gap-3 text-[#9898A8] px-4 py-3 hover:bg-[#232330] hover:text-[#F0F0F5] transition-all rounded-lg" href="#">
<span class="material-symbols-outlined" data-icon="Library_books">library_books</span>
<span class="font-medium">Assets</span>
</a>
<a class="flex items-center gap-3 text-[#9898A8] px-4 py-3 hover:bg-[#232330] hover:text-[#F0F0F5] transition-all rounded-lg" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-medium">History</span>
</a>
<a class="flex items-center gap-3 text-[#9898A8] px-4 py-3 hover:bg-[#232330] hover:text-[#F0F0F5] transition-all rounded-lg" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-medium">Settings</span>
</a>
</div>
<div class="mt-auto px-4 pb-4">
<button class="w-full flex items-center justify-center gap-2 py-3 bg-[#232330] rounded-xl text-white text-sm font-semibold hover:bg-[#2A2A3A] transition-all border border-white/5">
<span class="material-symbols-outlined text-sm">add</span>
                New Project
            </button>
</div>
</aside>
</body></html>
