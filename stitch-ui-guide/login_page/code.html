<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link as="style" crossorigin="" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-fixed": "#2f1500",
              "on-secondary-container": "#aec6ff",
              "tertiary": "#ffb77d",
              "surface-dim": "#131318",
              "error": "#ffb4ab",

              "surface-container-high": "#2a292f",
              "on-background": "#F0F0F5",

              "primary-container": "#947dff",
              "on-error-container": "#ffdad6",
              "on-surface": "#F0F0F5",
              "inverse-on-surface": "#303036",
              "primary": "#7C5CFC",
              "surface-tint": "#cabeff",

              "on-primary-fixed": "#1c0062",
              "surface-container-lowest": "#12121A",
              "surface-bright": "#39383e",
              "secondary": "#9898A8",
              "primary-fixed": "#e6deff",
              "on-primary": "#FFFFFF",
              "on-primary-fixed-variant": "#4918c8",
              "inverse-surface": "#e4e1e9",
              "inverse-primary": "#613de0",
              "secondary-fixed-dim": "#aec6ff",
              "surface-container-low": "#1A1A25",
              "on-surface-variant": "#c9c4d8",
              "secondary-fixed": "#d8e2ff",
              "on-primary-container": "#2b0088",
              "surface-variant": "#35343a",
              "outline-variant": "#2A2A3A",
              "on-tertiary": "#4d2600",
              "secondary-container": "#024ead",
              "on-secondary-fixed-variant": "#004397",
              "surface-container-highest": "#232330",
              "surface": "#12121A",
              "on-secondary": "#002e6b",
              "tertiary-container": "#d57a20",
              "primary-fixed-dim": "#cabeff",
              "on-error": "#690005",
              "tertiary-fixed": "#ffdcc3",
              "outline": "#5A5A6E",
              "error-container": "#93000a"
            },
            fontFamily: {
              "headline": ["Pretendard", "sans-serif"],
              "body": ["Pretendard", "sans-serif"],
              "label": ["Pretendard", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "md": "0.5rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px"},
          },
        },
      }

<style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0A0A0F;
        }
        .brand-gradient-text {
            background: linear-gradient(135deg, #7C5CFC 0%, #5B8DEF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand-gradient-bg {
            background: linear-gradient(135deg, #7C5CFC 0%, #5B8DEF 100%);
        }
        .input-focus-glow:focus {
            outline: none;
            border-color: #7C5CFC;
            box-shadow: 0 0 0 4px rgba(124, 92, 252, 0.15);
        }
        .glass-panel {
            background: rgba(18, 18, 26, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="flex min-h-screen items-center justify-center p-6 antialiased selection:bg-primary/30">
<!-- Login Container -->
<main class="w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Login Card -->
<div class="glass-panel border border-outline-variant/40 rounded-xl p-8 md:p-10 shadow-2xl">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10">
<h1 class="text-3xl font-bold tracking-tighter brand-gradient-text mb-2">Maketaa</h1>
<h2 class="text-xl font-semibold text-on-surface">로그인</h2>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-medium text-secondary tracking-wide uppercase" for="email">이메일</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant/60 rounded-md px-4 py-3 text-on-surface placeholder:text-outline/50 input-focus-glow transition-all duration-200" id="email" name="email" placeholder="example@email.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-xs font-medium text-secondary tracking-wide uppercase" for="password">비밀번호</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border border-outline-variant/60 rounded-md px-4 py-3 text-on-surface placeholder:text-outline/50 input-focus-glow transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full brand-gradient-bg text-on-primary font-semibold py-3.5 rounded-md hover:opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-primary/20" type="submit">
                        로그인
                    </button>
</div>
<!-- Forgot Password -->
<div class="text-center">
<a class="text-sm text-secondary hover:text-primary transition-colors" href="#">
                        비밀번호를 잊으셨나요?
                    </a>
</div>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/40"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="bg-[#12121A] px-4 text-outline/60 uppercase tracking-widest">또는</span>
</div>
</div>
<!-- Social Login -->
<div class="space-y-4">
<button class="w-full flex items-center justify-center gap-3 bg-transparent border border-outline-variant/60 text-outline cursor-not-allowed py-3 rounded-md opacity-60" disabled="" type="button">
<img alt="" class="w-5 h-5 grayscale" data-alt="Google logo icon in grayscale" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwylFQlWMXwZjyPt3UE5dk67AXw6f1zh8JdyuYLRZn2H177-22p30j7z702cXEVRIRDVygKANDwC1BZXxk4waKt5wOCNfAKMaQMH4ZKRL2sryt9UsfN_oicU2F_6blImqIknZxc64d0TMA9HA37VIgt_BwRPMA8kqb3PZNISySjy9uPeWj5iY4ByXRShhtMk7AFV_i1RDIUIKk2lyQ1Pd2ElKbozyBV8UAycMp3IagVVkRFlVU4GO1FwDRC93E_PCKxGjJlKbwshGD"/>
<span class="text-sm font-medium">Google로 계속하기</span>
<span class="ml-2 text-[10px] bg-surface-container-highest px-1.5 py-0.5 rounded border border-outline-variant/40">준비 중</span>
</button>
</div>
<!-- Footer Links -->
<div class="mt-10 text-center">
<p class="text-sm text-secondary">
                    계정이 없으신가요? 
                    <a class="ml-2 font-semibold text-primary hover:underline underline-offset-4 transition-all" href="#">회원가입</a>
</p>
</div>
</div>
<!-- System Footer (Contextual Suppression for Login) -->
<footer class="mt-8 text-center">
<p class="text-[10px] text-tertiary/40 uppercase tracking-[0.2em]">
                © 2024 Aura AI Marketing. Editorial Intelligence.
            </p>
</footer>
</main>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]"></div>
</div>
</body></html>
