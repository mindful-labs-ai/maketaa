<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed-variant": "#4918c8",
              "on-secondary-container": "#aec6ff",
              "inverse-primary": "#613de0",
              "secondary-fixed": "#d8e2ff",
              "tertiary": "#ffb77d",
              "on-primary-fixed": "#1c0062",
              "primary": "#cabeff",
              "primary-fixed": "#e6deff",
              "surface-container-lowest": "#0e0e13",
              "secondary-fixed-dim": "#aec6ff",
              "error-container": "#93000a",
              "surface-container-high": "#2a292f",
              "outline": "#938ea1",
              "on-error-container": "#ffdad6",
              "surface-bright": "#39383e",
              "secondary": "#aec6ff",
              "on-tertiary-fixed": "#2f1500",
              "primary-fixed-dim": "#cabeff",
              "inverse-surface": "#e4e1e9",
              "on-tertiary-container": "#432100",
              "on-error": "#690005",
              "on-secondary-fixed-variant": "#004397",
              "on-primary": "#32009a",
              "outline-variant": "#484555",
              "on-tertiary": "#4d2600",
              "surface-container-low": "#1b1b20",
              "tertiary-container": "#d57a20",
              "on-primary-container": "#2b0088",
              "surface-container": "#1f1f25",
              "tertiary-fixed": "#ffdcc3",
              "secondary-container": "#024ead",
              "on-surface": "#e4e1e9",
              "surface-variant": "#35343a",
              "tertiary-fixed-dim": "#ffb77d",
              "on-secondary-fixed": "#001a43",
              "on-secondary": "#002e6b",
              "surface-tint": "#cabeff",
              "surface": "#131318",
              "inverse-on-surface": "#303036",
              "error": "#ffb4ab",
              "primary-container": "#947dff",
              "on-tertiary-fixed-variant": "#6e3900",
              "surface-container-highest": "#35343a",
              "on-surface-variant": "#c9c4d8",
              "surface-dim": "#131318",
              "on-background": "#e4e1e9",
              "background": "#131318"
            },
            fontFamily: {
              "headline": ["Pretendard", "Manrope", "sans-serif"],
              "body": ["Pretendard", "Inter", "sans-serif"],
              "label": ["Pretendard", "Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #0A0A0F;
            color: #F0F0F5;
            font-family: 'Pretendard', sans-serif;
        }
        .ethereal-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .brand-gradient-text {
            background: linear-gradient(135deg, #7C5CFC 0%, #5B8DEF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand-gradient-bg {
            background: linear-gradient(135deg, #7C5CFC 0%, #5B8DEF 100%);
        }
        .ghost-border {
            border: 1px solid rgba(42, 42, 58, 0.4);
        }
    </style>
</head>
<body class="antialiased overflow-hidden">
<!-- Background Decoration -->
<div class="fixed inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-[#7C5CFC] opacity-[0.03] blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-[#5B8DEF] opacity-[0.03] blur-[120px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-6 text-center">
<!-- Error Status -->
<div class="mb-8">
<span class="label-sm text-[#5A5A6E] tracking-[0.2em] uppercase font-medium mb-4 block">System Response</span>
<h1 class="text-[12rem] md:text-[16rem] font-bold leading-none tracking-tighter brand-gradient-text select-none opacity-80">
                500
            </h1>
</div>
<!-- Messaging -->
<div class="max-w-md w-full mb-12">
<h2 class="text-3xl md:text-4xl font-semibold text-[#F0F0F5] mb-4 tracking-tight">
                서버 오류가 발생했습니다
            </h2>
<p class="text-[#9898A8] text-lg font-light leading-relaxed">
                잠시 후 다시 시도해주세요. 시스템이 현재 안정화 작업을 진행 중이거나 예기치 않은 오류가 발생했습니다.
            </p>
</div>
<!-- Action Matrix -->
<div class="flex flex-col sm:flex-row items-center gap-4 w-full max-w-sm">
<button class="w-full brand-gradient-bg text-[#F0F0F5] px-8 py-4 rounded-xl font-semibold transition-all active:scale-[0.98] shadow-[0_0_20px_rgba(124,92,252,0.15)] flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="refresh">refresh</span>
                다시 시도
            </button>
<button class="w-full bg-[#1A1A25]/50 ethereal-blur ghost-border text-[#F0F0F5] px-8 py-4 rounded-xl font-medium transition-all hover:bg-[#1A1A25] active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="home">home</span>
                홈으로
            </button>
</div>
<!-- Insight Footer (Soft Brutalist Module) -->
<div class="mt-24 p-6 rounded-2xl bg-[#7C5CFC]/[0.03] ghost-border max-w-lg w-full flex items-start gap-4 text-left">
<div class="p-2 rounded-lg bg-[#7C5CFC]/10 text-[#7C5CFC]">
<span class="material-symbols-outlined" data-icon="info">info</span>
</div>
<div>
<p class="text-sm font-semibold text-[#F0F0F5] mb-1">상태 정보</p>
<p class="text-xs text-[#9898A8] leading-relaxed">
                    엔지니어링 팀에 오류 보고서가 자동으로 전송되었습니다. 사용자의 데이터는 안전하게 보호되고 있으며, 가능한 한 빨리 서비스를 복구하도록 하겠습니다.
                </p>
</div>
</div>
</main>
<!-- Visual Anchor: Grainy Overlay -->
<div class="fixed inset-0 pointer-events-none z-50 opacity-[0.02] mix-blend-overlay">
<svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<filter id="noise">
<feturbulence basefrequency="0.65" numoctaves="3" stitchtiles="stitch" type="fractalNoise"></feturbulence>
</filter>
<rect filter="url(#noise)" height="100%" width="100%"></rect>
</svg>
</div>
</body></html>
