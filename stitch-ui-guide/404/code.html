<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed-variant": "#4918c8",
              "on-secondary-container": "#aec6ff",
              "inverse-primary": "#613de0",
              "secondary-fixed": "#d8e2ff",
              "tertiary": "#ffb77d",
              "on-primary-fixed": "#1c0062",
              "primary": "#cabeff",
              "primary-fixed": "#e6deff",
              "surface-container-lowest": "#0e0e13",
              "secondary-fixed-dim": "#aec6ff",
              "error-container": "#93000a",
              "surface-container-high": "#2a292f",
              "outline": "#938ea1",
              "on-error-container": "#ffdad6",
              "surface-bright": "#39383e",
              "secondary": "#aec6ff",
              "on-tertiary-fixed": "#2f1500",
              "primary-fixed-dim": "#cabeff",
              "inverse-surface": "#e4e1e9",
              "on-tertiary-container": "#432100",
              "on-error": "#690005",
              "on-secondary-fixed-variant": "#004397",
              "on-primary": "#32009a",
              "outline-variant": "#484555",
              "on-tertiary": "#4d2600",
              "surface-container-low": "#1b1b20",
              "tertiary-container": "#d57a20",
              "on-primary-container": "#2b0088",
              "surface-container": "#1f1f25",
              "tertiary-fixed": "#ffdcc3",
              "secondary-container": "#024ead",
              "on-surface": "#e4e1e9",
              "surface-variant": "#35343a",
              "tertiary-fixed-dim": "#ffb77d",
              "on-secondary-fixed": "#001a43",
              "on-secondary": "#002e6b",
              "surface-tint": "#cabeff",
              "surface": "#131318",
              "inverse-on-surface": "#303036",
              "error": "#ffb4ab",
              "primary-container": "#947dff",
              "on-tertiary-fixed-variant": "#6e3900",
              "surface-container-highest": "#35343a",
              "on-surface-variant": "#c9c4d8",
              "surface-dim": "#131318",
              "on-background": "#e4e1e9",
              "background": "#131318"
            },
            fontFamily: {
              "headline": ["Pretendard", "Manrope", "sans-serif"],
              "body": ["Pretendard", "Inter", "sans-serif"],
              "label": ["Pretendard", "Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0A0A0F;
            font-family: 'Pretendard', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .brand-gradient {
            background: linear-gradient(135deg, #7C5CFC 0%, #5B8DEF 100%);
        }
        .text-tertiary-muted {
            color: #5A5A6E;
            opacity: 0.2;
        }
        .ghost-border {
            border: 1px solid rgba(42, 42, 58, 0.4);
        }
        .glass-panel {
            background: rgba(35, 35, 48, 0.6);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="text-on-background overflow-hidden">
<!-- Header / Branding Anchor (Suppressed Navigation for 404 focus) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 border-b border-[#2A2A3A]/40 bg-[#0A0A0F]/80 backdrop-blur-xl">
<div class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-[#7C5CFC] to-[#5B8DEF]">
            The Curator
        </div>
<div class="flex items-center gap-4">
<button class="text-[#9898A8] hover:text-[#F0F0F5] transition-all material-symbols-outlined" data-icon="help">help</button>
</div>
</header>
<!-- Main Canvas -->
<main class="relative min-h-screen w-full flex flex-col items-center justify-center p-6 bg-[#0A0A0F]">
<!-- Background Decorative Element (Subtle Brand Bloom) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#7C5CFC]/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="relative z-10 text-center flex flex-col items-center max-w-2xl">
<!-- Giant Error Code (Literal transcription of 120px request) -->
<div class="select-none font-bold tracking-tighter text-tertiary-muted leading-none mb-4" style="font-size: 120px;">
                404
            </div>
<!-- Content Group -->
<div class="space-y-6">
<div class="space-y-2">
<h1 class="text-3xl md:text-4xl font-semibold tracking-tight text-on-surface">
                        페이지를 찾을 수 없습니다
                    </h1>
<p class="text-lg text-[#9898A8] font-light max-w-md mx-auto">
                        요청하신 페이지가 존재하지 않거나 이동되었습니다
                    </p>
</div>
<!-- CTA Actions -->
<div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-4">
<a class="brand-gradient text-white px-8 py-3.5 rounded-lg font-semibold flex items-center gap-2 transition-all active:scale-95 shadow-[0_4px_20px_rgba(124,92,252,0.2)]" href="/">
<span class="material-symbols-outlined text-[20px]" data-icon="home">home</span>
                        홈으로 돌아가기
                    </a>
<button class="bg-[#1A1A25] ghost-border text-[#F0F0F5] px-8 py-3.5 rounded-lg font-medium hover:bg-[#232330] transition-all active:scale-95" onclick="window.history.back()">
                        이전 페이지로
                    </button>
</div>
</div>
<!-- AI Insight Hint (Subtle Component) -->
<div class="mt-16 p-4 rounded-xl border border-[#7C5CFC]/10 bg-[#7C5CFC]/5 max-w-sm">
<div class="flex items-start gap-3 text-left">
<span class="material-symbols-outlined text-[#7C5CFC]" data-icon="auto_awesome">auto_awesome</span>
<div>
<p class="text-xs font-semibold text-[#7C5CFC] uppercase tracking-wider mb-1">Curator Tip</p>
<p class="text-xs text-[#9898A8] leading-relaxed">
                            원하시는 정보를 찾으려면 상단의 검색 아이콘을 이용하거나 대시보드에서 최근 프로젝트를 확인해 보세요.
                        </p>
</div>
</div>
</div>
</div>
<!-- Footer Visual Anchor -->
<div class="absolute bottom-8 text-center">
<p class="text-[10px] text-[#5A5A6E] tracking-[0.2em] uppercase">
                © 2024 The Curator Pro. All Rights Reserved.
            </p>
</div>
</main>
<!-- Structural Overlay (Grid Texture) -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03]" style="background-image: radial-gradient(#F0F0F5 1px, transparent 1px); background-size: 32px 32px;"></div>
</body></html>
