<!DOCTYPE html>

<html class="dark" lang="ko"><head>

<style>
      body { font-family: 'Pretendard', sans-serif; }
      .material-symbols-outlined {

<body class="bg-[#0A0A0F] text-[#F0F0F5] min-h-screen flex items-center justify-center p-4">
<!-- Background Dim Layer (Editor Page Context) -->
<div class="fixed inset-0 z-0 opacity-40">
<div class="grid grid-cols-12 h-full w-full">
<aside class="col-span-2 bg-[#12121A] border-r border-[#2A2A3A]/40 p-4 space-y-4">
<div class="h-8 bg-[#1A1A25] rounded-lg w-3/4"></div>
<div class="space-y-2">
<div class="h-10 bg-[#1A1A25] rounded-lg"></div>
<div class="h-10 bg-[#1A1A25] rounded-lg"></div>
<div class="h-10 bg-[#1A1A25] rounded-lg"></div>
</div>
</aside>
<main class="col-span-10 p-8 space-y-6">
<div class="h-[400px] w-full bg-[#1A1A25] rounded-2xl flex items-center justify-center">
<span class="material-symbols-outlined text-4xl text-[#5A5A6E]">movie_edit</span>
</div>
<div class="h-24 w-full bg-[#1A1A25] rounded-xl border border-[#2A2A3A]/40"></div>
</main>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
<!-- AI Config Modal -->
<div class="w-full max-w-[560px] bg-[#12121A] rounded-[16px] border border-[#2A2A3A] flex flex-col shadow-2xl overflow-hidden">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-5 border-b border-[#2A2A3A]/40">
<h2 class="text-[#F0F0F5] font-semibold text-lg tracking-tight">AI 설정</h2>
<button class="text-[#9898A8] hover:text-[#F0F0F5] transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Content Container -->
<div class="flex-1 overflow-y-auto max-h-[716px] custom-scrollbar">
<!-- 1. 글로벌 스타일 -->
<section class="p-6 space-y-3">
<label class="text-[#9898A8] text-[11px] font-medium tracking-widest uppercase block">글로벌 스타일</label>
<textarea class="w-full bg-[#1A1A25] border border-[#2A2A3A]/40 rounded-xl p-4 text-sm text-[#F0F0F5] focus:ring-2 focus:ring-[#7C5CFC]/20 focus:border-[#7C5CFC] outline-none transition-all min-h-[80px] resize-none" placeholder="스타일 프롬프트를 입력하세요">A masterpiece Japanese style anime illustration</textarea>
</section>
<div class="h-px bg-[#2A2A3A]/40 mx-6"></div>
<!-- 2. 화면 비율 -->
<section class="p-6 space-y-3">
<label class="text-[#9898A8] text-[11px] font-medium tracking-widest uppercase block">화면 비율</label>
<div class="grid grid-cols-6 gap-2">
<!-- 1:1 -->
<button class="flex flex-col items-center justify-center p-2 rounded-lg bg-[#1A1A25] border border-[#2A2A3A]/40 hover:bg-[#232330] transition-all group">
<div class="w-6 h-6 border-2 border-[#9898A8] rounded-sm group-hover:border-[#F0F0F5]"></div>
<span class="text-[10px] mt-1 text-[#9898A8]">1:1</span>
</button>
<!-- 4:3 -->
<button class="flex flex-col items-center justify-center p-2 rounded-lg bg-[#1A1A25] border border-[#2A2A3A]/40 hover:bg-[#232330] transition-all group">
<div class="w-8 h-6 border-2 border-[#9898A8] rounded-sm group-hover:border-[#F0F0F5]"></div>
<span class="text-[10px] mt-1 text-[#9898A8]">4:3</span>
</button>
<!-- 3:4 -->
<button class="flex flex-col items-center justify-center p-2 rounded-lg bg-[#1A1A25] border border-[#2A2A3A]/40 hover:bg-[#232330] transition-all group">
<div class="w-5 h-7 border-2 border-[#9898A8] rounded-sm group-hover:border-[#F0F0F5]"></div>
<span class="text-[10px] mt-1 text-[#9898A8]">3:4</span>
</button>
<!-- 16:9 (Active) -->
<button class="flex flex-col items-center justify-center p-2 rounded-lg bg-[#1A1A25] border-2 border-[#7C5CFC] brand-glow transition-all ring-1 ring-[#7C5CFC]/30">
<div class="w-9 h-5 border-2 border-[#7C5CFC] rounded-sm"></div>
<span class="text-[10px] mt-1 text-[#F0F0F5] font-medium">16:9</span>
</button>
<!-- 9:16 -->
<button class="flex flex-col items-center justify-center p-2 rounded-lg bg-[#1A1A25] border border-[#2A2A3A]/40 hover:bg-[#232330] transition-all group">
<div class="w-4 h-7 border-2 border-[#9898A8] rounded-sm group-hover:border-[#F0F0F5]"></div>
<span class="text-[10px] mt-1 text-[#9898A8]">9:16</span>
</button>
<!-- 21:9 -->
<button class="flex flex-col items-center justify-center p-2 rounded-lg bg-[#1A1A25] border border-[#2A2A3A]/40 hover:bg-[#232330] transition-all group">
<div class="w-10 h-4 border-2 border-[#9898A8] rounded-sm group-hover:border-[#F0F0F5]"></div>
<span class="text-[10px] mt-1 text-[#9898A8]">21:9</span>
</button>
</div>
</section>
<div class="h-px bg-[#2A2A3A]/40 mx-6"></div>
<!-- 3 & 4. 해상도 & AI 모델 -->
<div class="grid grid-cols-2 gap-0">
<section class="p-6 space-y-3 border-r border-[#2A2A3A]/40">
<label class="text-[#9898A8] text-[11px] font-medium tracking-widest uppercase block">해상도</label>
<div class="flex bg-[#1A1A25] p-1 rounded-xl border border-[#2A2A3A]/40">
<button class="flex-1 py-1.5 text-xs rounded-lg text-[#9898A8] hover:text-[#F0F0F5] transition-colors">480p</button>
<button class="flex-1 py-1.5 text-xs rounded-lg bg-[#232330] text-[#F0F0F5] font-medium shadow-sm">720p</button>
</div>
</section>
<section class="p-6 space-y-3">
<label class="text-[#9898A8] text-[11px] font-medium tracking-widest uppercase block">AI 모델</label>
<div class="space-y-3">
<div class="relative group">
<label class="text-[10px] text-[#5A5A6E] absolute -top-2 left-3 bg-[#12121A] px-1 z-10">이미지 AI</label>

<span class="material-symbols-outlined text-sm">expand_more</span>

</div>

<div class="w-full bg-[#1A1A25] border border-[#2A2A3A]/40 rounded-xl px-4 py-2 text-sm flex justify-between items-center cursor-pointer group-hover:border-[#7C5CFC]/40 transition-colors">
<span>Kling</span>
<span class="material-symbols-outlined text-sm">expand_more</span>
</div>
</div>
</div>
</section>
</div>
<div class="h-px bg-[#2A2A3A]/40 mx-6"></div>
<!-- 5. 클립 길이 -->
<section class="p-6 space-y-4">
<div class="flex justify-between items-center">
<label class="text-[#9898A8] text-[11px] font-medium tracking-widest uppercase block">클립 길이</label>
<span class="text-xs font-bold text-[#7C5CFC] px-2 py-0.5 bg-[#7C5CFC]/10 rounded">5s</span>
</div>
<div class="relative w-full h-1.5 bg-[#1A1A25] rounded-full overflow-hidden">
<div class="absolute left-0 top-0 h-full brand-gradient w-[50%]"></div>
<div class="absolute left-[50%] top-1/2 -translate-y-1/2 w-4 h-4 bg-[#F0F0F5] rounded-full shadow-lg border-2 border-[#7C5CFC] -ml-2 cursor-pointer"></div>
</div>
</section>
<div class="h-px bg-[#2A2A3A]/40 mx-6"></div>
<!-- 6. 레퍼런스 이미지 -->
<section class="p-6 space-y-3">
<label class="text-[#9898A8] text-[11px] font-medium tracking-widest uppercase block">레퍼런스 이미지</label>
<div class="flex gap-3 overflow-x-auto pb-2 custom-scrollbar">
<!-- Upload Slot -->
<div class="min-w-[80px] h-20 border-2 border-dashed border-[#2A2A3A] rounded-xl flex flex-col items-center justify-center cursor-pointer hover:border-[#7C5CFC]/40 hover:bg-[#1A1A25] transition-all group">
<span class="material-symbols-outlined text-[#5A5A6E] group-hover:text-[#7C5CFC]">add_photo_alternate</span>

<!-- Thumbnail 1 -->

<span class="material-symbols-outlined text-[14px]">close</span>
</button>
</div>
<!-- Thumbnail 2 -->
<div class="relative min-w-[80px] h-20 rounded-xl overflow-hidden group">
<img alt="" class="w-full h-full object-cover" data-alt="Cyberpunk neon city conceptual art" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBR8-BHDsU3GccTayloQw_8xraCLLt6bc2iV3M7HfFgnZzPPaWsYZNUi4oj5f6A5LArnZafkoLxkhbsL40fheHcU8OYSJvR2Zz_MnFiDRNudtl_tVxCuGxTGincnwxdzueG5jX-_7CZS9FEVja-iZapCXfKrq4Cns3EA-WehcacvWPtDQGcGQBTgGN2lOKXq2g-AO-GS-Bww4OMbQJMmHBw1kFeOlDshSRZg8jMA06qUCyuoyjVZCgJKd2fIByZ4vbI64SIHMJi5ARL"/>
<button class="absolute top-1 right-1 w-5 h-5 bg-black/60 rounded-full flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-[14px]">close</span>
</button>
</div>
</div>
</section>
<div class="h-px bg-[#2A2A3A]/40 mx-6"></div>
<!-- 7. 커스텀 규칙 -->
<section class="p-6 space-y-3">
<label class="text-[#9898A8] text-[11px] font-medium tracking-widest uppercase block">커스텀 규칙</label>
<div class="bg-gradient-to-r from-[#7C5CFC]/5 to-transparent p-px rounded-xl">
<textarea class="w-full bg-[#1A1A25] border border-[#2A2A3A]/40 rounded-xl p-4 text-sm text-[#F0F0F5] focus:ring-2 focus:ring-[#7C5CFC]/20 focus:border-[#7C5CFC] outline-none transition-all min-h-[100px] resize-none" placeholder="AI가 지켜야 할 추가 규칙을 자유롭게 입력하세요. (예: 인물 얼굴은 클로즈업하지 마세요)"></textarea>
</div>
</section>
</div>
<!-- Footer -->
<div class="px-6 py-5 border-t border-[#2A2A3A]/40 flex gap-3 justify-end items-center bg-[#0A0A0F]/50">
<button class="px-6 py-2.5 text-sm font-medium text-[#9898A8] hover:text-[#F0F0F5] transition-colors">취소</button>
<button class="px-10 py-2.5 text-sm font-bold text-[#F0F0F5] brand-gradient rounded-xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all ring-1 ring-white/10">저장</button>
</div>
</div>
</div>
</body></html>
