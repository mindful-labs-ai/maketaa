<body class="bg-[#0A0A0F] text-[#F0F0F5] min-h-screen flex flex-col">

<header class="fixed top-0 w-full z-50 bg-[#12121A] flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<span class="text-lg font-bold tracking-tighter text-[#F0F0F5]">Maketaa Lumina</span>
</div>
<nav class="hidden md:flex items-center gap-8">

</nav>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#9898A8] hover:bg-[#1A1A25] p-2 rounded-md transition-all active:scale-95">help</button>

</div>
</header>

<div class="w-8 h-[1px] bg-[#232330]"></div>
<div class="flex items-center gap-2">

</div>
<div class="w-8 h-[1px] bg-[#232330]"></div>
<div class="flex items-center gap-2">

<span class="text-[#5A5A6E] text-sm">디자인</span>
</div>
</div>

<div class="text-center mb-10">

<p class="text-[#9898A8] text-[0.875rem]">카드뉴스의 주제를 선택하거나 직접 입력하세요</p>
</div>

<div class="w-full space-y-8">

<div class="space-y-4">
<div class="flex flex-wrap justify-center gap-2">
<button class="px-5 py-2.5 rounded-full bg-[#1A1A25] text-[#F0F0F5] border border-[#2A2A3A]/40 text-sm hover:border-[#7C5CFC] transition-all active:scale-95">건강</button>
<button class="px-5 py-2.5 rounded-full bg-[#1A1A25] text-[#F0F0F5] border border-[#2A2A3A]/40 text-sm hover:border-[#7C5CFC] transition-all active:scale-95">금융</button>
<button class="px-5 py-2.5 rounded-full bg-[#1A1A25] text-[#F0F0F5] border border-[#2A2A3A]/40 text-sm hover:border-[#7C5CFC] transition-all active:scale-95">라이프스타일</button>
<button class="px-5 py-2.5 rounded-full bg-[#1A1A25] text-[#F0F0F5] border border-[#2A2A3A]/40 text-sm hover:border-[#7C5CFC] transition-all active:scale-95">테크</button>
<button class="px-5 py-2.5 rounded-full bg-[#1A1A25] text-[#F0F0F5] border border-[#2A2A3A]/40 text-sm hover:border-[#7C5CFC] transition-all active:scale-95">교육</button>

<button class="px-5 py-2.5 rounded-full bg-[#1A1A25] text-[#F0F0F5] border border-[#2A2A3A]/40 text-sm hover:border-[#7C5CFC] transition-all active:scale-95">여행</button>

<div class="flex justify-center">
<button class="flex items-center gap-2 px-4 py-2 text-[#7C5CFC] text-sm font-medium hover:bg-[#7C5CFC]/5 rounded-lg transition-colors">
<span class="material-symbols-outlined text-[18px]">auto_awesome</span>

                        </button>
</div>

<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-[#232330]"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-[#0A0A0F] px-4 text-[0.6875rem] font-medium text-[#5A5A6E] tracking-widest uppercase">직접 입력</span>
</div>
</div>
<div class="space-y-2">
<label class="text-[0.6875rem] font-medium text-[#5A5A6E] ml-1">주제 입력</label>
<div class="relative group">
<input class="w-full bg-[#12121A] border border-[#2A2A3A]/40 rounded-xl px-4 py-4 text-[#F0F0F5] placeholder-[#5A5A6E] focus:outline-none focus:border-[#7C5CFC] focus:ring-4 focus:ring-[#7C5CFC]/15 transition-all" placeholder="원하는 주제를 자유롭게 입력하세요" type="text"/>
</div>
</div>

<div class="pt-8">
<button class="w-full h-14 rounded-xl flex items-center justify-center gap-2 bg-[#1A1A25] text-[#5A5A6E] cursor-not-allowed transition-all font-semibold" disabled="">

                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center mt-4 text-[0.75rem] text-[#5A5A6E]">주제를 선택하거나 입력하면 다음 단계로 이동할 수 있습니다.</p>
</div>
</div>

<div class="mt-16 w-full p-6 rounded-xl bg-[#7C5CFC]/5 border border-[#7C5CFC]/10">

<div class="p-2 rounded-lg bg-[#7C5CFC]/10">
<span class="material-symbols-outlined text-[#7C5CFC]" data-weight="fill">lightbulb</span>
</div>
<div>
<h4 class="text-sm font-semibold text-[#F0F0F5] mb-1">인사이트 가이드</h4>
<p class="text-sm text-[#9898A8] leading-relaxed">

                        </p>
</div>
</div>
