# Agent Registry - 에이전트 등록소
# 오케스트레이터가 이 파일을 참조하여 에이전트를 호출합니다.
# 각 에이전트의 상세 정의는 개별 .md 파일에 있습니다.

version: "3.3"
updated_at: "2026-03-15"

# ─────────────────────────────────────────
# 시스템
# ─────────────────────────────────────────
orchestrator:
  name: "오케스트레이터"
  spec: "agents/orchestrator.md"
  model: "claude-sonnet-4-20250514"
  team: system
  trigger: ["scheduler", "manual"]

# ─────────────────────────────────────────
# 프로덕트 팀
# ─────────────────────────────────────────
pm:
  name: "프로덕트 매니저"
  spec: "agents/product_team/pm.md"
  model: "claude-sonnet-4-20250514"
  team: product
  trigger: ["operator_request", "auto_detect"]
  calls: ["designer", "engineer"]

designer:
  name: "프로덕트 디자이너"
  spec: "agents/product_team/designer.md"
  model: "claude-sonnet-4-20250514"
  team: product
  trigger: ["pm_task"]
  depends_on: ["pm"]
  feeds_into: ["engineer"]

engineer:
  name: "프로덕트 엔지니어"
  spec: "agents/product_team/engineer.md"
  model: "claude-sonnet-4-20250514"
  team: product
  trigger: ["pm_task", "designer_handoff"]
  depends_on: ["pm", "designer"]

# ─────────────────────────────────────────
# 콘텐츠 제작팀 (파이프라인 순서대로)
# ─────────────────────────────────────────
researcher:
  name: "리서처"
  spec: "agents/content_team/01_researcher.md"
  model: "claude-sonnet-4-20250514"
  team: content
  pipeline_order: 1
  trigger: ["content_pipeline"]
  timeout_seconds: 300
  max_retries: 2
  feeds_into: ["strategist"]

strategist:
  name: "콘텐츠 전략가"
  spec: "agents/content_team/02_strategist.md"
  model: "claude-sonnet-4-20250514"
  team: content
  pipeline_order: 2
  trigger: ["content_pipeline"]
  timeout_seconds: 180
  max_retries: 2
  depends_on: ["researcher"]
  feeds_into: ["copywriter"]

copywriter:
  name: "카피라이터"
  spec: "agents/content_team/03_copywriter.md"
  model: "claude-sonnet-4-20250514"
  team: content
  pipeline_order: 3
  trigger: ["content_pipeline"]
  timeout_seconds: 180
  max_retries: 2
  depends_on: ["strategist"]
  feeds_into: ["design_director"]

design_director:
  name: "디자인 디렉터"
  spec: "agents/content_team/04_design_director.md"
  model: "claude-sonnet-4-20250514"
  team: content
  pipeline_order: 4
  trigger: ["content_pipeline"]
  timeout_seconds: 180
  max_retries: 2
  depends_on: ["copywriter"]
  feeds_into: ["image_generator"]

image_generator:
  name: "이미지 제너레이터"
  spec: "agents/content_team/05_image_generator.md"
  model: "claude-sonnet-4-20250514"
  team: content
  pipeline_order: 5
  trigger: ["content_pipeline"]
  timeout_seconds: 600
  max_retries: 2
  depends_on: ["design_director"]
  feeds_into: ["qa_editor"]
  tools: ["image_gen_api", "renderer"]

qa_editor:
  name: "QA 에디터"
  spec: "agents/content_team/06_qa_editor.md"
  model: "claude-sonnet-4-20250514"
  team: content
  pipeline_order: 6
  trigger: ["content_pipeline"]
  timeout_seconds: 180
  max_retries: 1
  depends_on: ["image_generator"]
  feeds_into: ["human_approval"]
  tools: ["web_search"]

publisher:
  name: "퍼블리셔"
  spec: "agents/content_team/07_publisher.md"
  model: "claude-sonnet-4-20250514"
  team: content
  pipeline_order: 7
  trigger: ["human_approval_complete"]
  timeout_seconds: 120
  max_retries: 2
  depends_on: ["human_approval"]
  tools: ["instagram_api", "threads_api"]

# ─────────────────────────────────────────
# 파이프라인 정의
# ─────────────────────────────────────────
pipelines:
  content_pipeline:
    description: "카드뉴스 콘텐츠 제작 파이프라인"
    trigger: "scheduler(mon,wed,fri 09:00) | manual"
    steps:
      - researcher
      - strategist
      - copywriter
      - design_director
      - image_generator
      - qa_editor
      - human_approval      # checkpoint
      - publisher

  product_task:
    description: "프로덕트 팀 태스크 처리"
    trigger: "operator_request | auto_detect"
    steps:
      - pm
      - parallel: [designer, engineer]
      - pm  # verification

# ─────────────────────────────────────────
# 태스크 유형 → 에이전트 매핑
# ─────────────────────────────────────────
task_routing:
  content_creation:
    pipeline: content_pipeline
    description: "카드뉴스 콘텐츠 생성"

  feature_request:
    entry_agent: pm
    pipeline: product_task
    description: "새 기능 요청"

  bug_report:
    entry_agent: pm
    pipeline: product_task
    description: "버그 리포트"

  design_review:
    entry_agent: designer
    description: "디자인 리뷰 요청"

  code_fix:
    entry_agent: engineer
    description: "코드 수정 요청"

  manual_publish:
    entry_agent: publisher
    description: "수동 발행 요청"

  quality_check:
    entry_agent: qa_editor
    description: "품질 검수 요청"
