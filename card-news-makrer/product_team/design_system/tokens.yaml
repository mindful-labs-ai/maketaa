# Design System Tokens
# 프로덕트 디자이너(AGENT 0-D)가 관리하는 디자인 토큰

colors:
  primary: "#7B68EE"       # 메인 브랜드 컬러 (Medium Slate Blue)
  surface: "#F8F7FF"       # 배경 서피스
  text_primary: "#2D2D2D"  # 주요 텍스트
  text_secondary: "#6B7280" # 보조 텍스트
  success: "#52C41A"       # 성공 상태
  warning: "#FAAD14"       # 경고 상태
  error: "#FF4D4F"         # 에러 상태
  border: "#E5E7EB"        # 기본 보더

typography:
  heading:
    family: "Pretendard"
    weight: "Bold"
    size: "24px"
    letter_spacing: "-0.5px"
    line_height: "1.3"
  body:
    family: "Pretendard"
    weight: "Regular"
    size: "14px"
    letter_spacing: "0.2px"
    line_height: "1.6"
  caption:
    family: "Pretendard"
    weight: "Regular"
    size: "12px"
    letter_spacing: "0.1px"
    line_height: "1.4"

spacing:
  unit: 4  # 기본 단위 (px)
  scale: [4, 8, 12, 16, 24, 32, 48, 64]

border_radius:
  small: "4px"
  medium: "8px"
  large: "12px"
  full: "9999px"

shadows:
  small: "0 1px 2px rgba(0, 0, 0, 0.05)"
  medium: "0 4px 6px rgba(0, 0, 0, 0.07)"
  large: "0 10px 15px rgba(0, 0, 0, 0.1)"

components:
  button:
    variants: ["primary", "secondary", "ghost", "danger"]
    height:
      small: "32px"
      medium: "40px"
      large: "48px"
    padding_x: "16px"
    border_radius: "8px"

  card:
    background: "#FFFFFF"
    border: "1px solid #E5E7EB"
    border_radius: "12px"
    padding: "16px"
    shadow: "0 1px 2px rgba(0, 0, 0, 0.05)"

  panel:
    background: "#F8F7FF"
    width: "320px"
    padding: "24px"

  toast:
    border_radius: "8px"
    padding: "12px 16px"
    duration_ms: 3000
    variants: ["success", "warning", "error", "info"]

  modal:
    overlay_opacity: 0.5
    border_radius: "16px"
    padding: "32px"
    max_width: "480px"

# 카드뉴스 콘텐츠용 기본 팔레트 (디자인 디렉터 참조)
content_palettes:
  calm:
    name: "차분한"
    primary: "#7B9EBD"
    secondary: "#B8D4E3"
    accent: "#4A7C9B"
    bg: "#F0F4F8"
  warm:
    name: "따뜻한"
    primary: "#E8A87C"
    secondary: "#F5D5C8"
    accent: "#D4856B"
    bg: "#FFF5F0"
  nature:
    name: "자연"
    primary: "#7CB88E"
    secondary: "#C8E6C9"
    accent: "#4CAF50"
    bg: "#F1F8E9"
  soft:
    name: "부드러운"
    primary: "#B39DDB"
    secondary: "#E1D5F0"
    accent: "#9575CD"
    bg: "#F3E5F5"
