# settings.yaml - 멘탈헬스 카드뉴스 자동 제작 시스템 설정

# 프로젝트 기본 정보
project:
  name: "멘탈헬스 카드뉴스 자동 제작 시스템"
  version: "3.0"
  environment: "development"  # development | staging | production

# Claude API 설정
claude_api:
  model: "claude-sonnet-4-20250514"
  max_tokens: 4096
  temperature: 0.7

# 이미지 생성 API 설정
image_api:
  provider: "dall-e"  # dall-e | flux
  model: "dall-e-3"
  size: "1024x1024"
  quality: "hd"

# SNS API 설정
sns:
  instagram:
    enabled: true
    api_version: "v19.0"
    # access_token: ${INSTAGRAM_ACCESS_TOKEN}  # 환경변수에서 로드
    # business_account_id: ${INSTAGRAM_BUSINESS_ID}
  threads:
    enabled: true
    # access_token: ${THREADS_ACCESS_TOKEN}

# 스케줄러 설정
scheduler:
  enabled: true
  timezone: "Asia/Seoul"
  content_pipeline:
    cron: "0 9 * * 1,3,5"  # 월/수/금 오전 9시

# 알림 설정
notifications:
  approval_reminder:
    enabled: true
    channels:
      - type: "email"
        # to: ${NOTIFICATION_EMAIL}
      - type: "slack"
        # webhook_url: ${SLACK_WEBHOOK_URL}

# 카드뉴스 설정
cardnews:
  card_count:
    min: 6
    max: 10
  image:
    width: 1080
    height: 1080
    format: "png"
  text:
    headline_max_length: 15
    body_max_length: 50

# 파일 경로 설정
paths:
  output_dir: "./output"
  assets_dir: "./output/{date}/assets"
  cards_dir: "./output/{date}/cards"
  schemas_dir: "./schemas"

# 로깅 설정
logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR
  file: "./logs/pipeline.log"
  format: "{time} | {level} | {agent} | {message}"

# QA 에디터 설정
qa:
  safety_keywords:
    block: ["자해", "자살", "극단적 선택"]
    warn: ["우울증 진단", "약물 처방", "치료 방법"]
  factcheck:
    require_source: true
    max_stat_age_years: 3
